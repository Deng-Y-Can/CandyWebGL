<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>多轴旋转效果太极图</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        taiji-gold: '#d4af37',
                        taiji-bronze: '#cd7f32',
                    },
                    fontFamily: {
                        song: ['"SimSun"', '"STSong"', 'serif'],
                        kai: ['"KaiTi"', '"STKaiti"', 'serif']
                    },
                }
            }
        }
    </script>
    
    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto {
                content-visibility: auto;
            }
            .preserve-3d {
                transform-style: preserve-3d;
            }
            .perspective-strong {
                perspective: 1800px;
            }
            .backface-hidden {
                backface-visibility: hidden;
            }
            .cylinder-main {
                --cylinder-depth: 40px;
                position: relative;
                width: 100%;
                height: 100%;
                transform-style: preserve-3d;
            }
            .axis-indicator {
                position: absolute;
                background-color: rgba(212, 175, 55, 0.6);
                transform-origin: center;
                z-index: 50;
            }
            .axis-x {
                width: 100%;
                height: 2px;
                top: 50%;
                left: 0;
                background: linear-gradient(to right, transparent, rgba(212, 175, 55, 0.6), transparent);
            }
            .axis-y {
                width: 2px;
                height: 100%;
                top: 0;
                left: 50%;
                background: linear-gradient(to bottom, transparent, rgba(212, 175, 55, 0.6), transparent);
            }
            .axis-z {
                position: absolute;
                width: 6px;
                height: 6px;
                background-color: rgba(212, 175, 55, 0.9);
                border-radius: 50%;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                box-shadow: 0 0 10px rgba(212, 175, 55, 0.8);
                z-index: 55;
            }
            .cylinder-top {
                position: absolute;
                width: 100%;
                height: 100%;
                border-radius: 50%;
                background-color: rgba(255, 255, 255, 0.98);
                border: 1px solid rgba(212, 175, 55, 0.5);
                transform: translateZ(var(--cylinder-depth));
                z-index: 30;
                box-shadow: 0 0 40px rgba(212, 175, 55, 0.25) inset;
            }
            .cylinder-side {
                position: absolute;
                width: 100%;
                height: var(--cylinder-depth);
                background: linear-gradient(90deg, 
                    rgba(212, 175, 55, 0.4) 0%, 
                    rgba(205, 127, 50, 0.25) 50%, 
                    rgba(212, 175, 55, 0.3) 100%);
                transform-origin: center bottom;
                transform: translateY(-100%) rotateX(90deg);
                z-index: 20;
                border: 1px solid rgba(212, 175, 55, 0.4);
                border-top: none;
                border-bottom: none;
                box-shadow: 0 0 15px rgba(212, 175, 55, 0.2);
            }
            .cylinder-bottom {
                position: absolute;
                width: 100%;
                height: 100%;
                border-radius: 50%;
                background-color: rgba(20, 20, 20, 0.98);
                border: 1px solid rgba(212, 175, 55, 0.3);
                z-index: 10;
                box-shadow: 0 0 40px rgba(0, 0, 0, 0.5) inset;
            }
            .trigram {
                display: inline-block;
                width: 45px;
                height: 36px;
                position: relative;
                transition: all 0.3s ease;
            }
            .trigram-line {
                position: absolute;
                width: 100%;
                height: 3px;
                left: 0;
                background-color: currentColor;
                transition: all 0.3s ease;
            }
            .trigram-line.top { top: 0; }
            .trigram-line.middle { top: 16px; }
            .trigram-line.bottom { top: 32px; }
            .broken {
                background: none;
            }
            .broken::before, .broken::after {
                content: '';
                position: absolute;
                width: 18px;
                height: 3px;
                background-color: currentColor;
            }
            .broken::before { left: 0; }
            .broken::after { right: 0; }
            .bagua-item {
                position: absolute;
                width: 80px;
                margin-left: -40px;
                text-align: center;
                transform-style: preserve-3d;
                transition: all 0.3s ease;
            }
            .bagua-item:hover {
                transform: translateZ(25px) scale(1.3) !important;
                z-index: 40;
            }
            .base-shadow {
                position: absolute;
                bottom: -20%;
                left: 50%;
                width: 85%;
                height: 30%;
                background: radial-gradient(ellipse at center, rgba(0,0,0,0.4) 0%, rgba(0,0,0,0) 70%);
                transform: translateX(-50%) rotateX(90deg);
                transform-origin: center top;
                z-index: 5;
                filter: blur(5px);
            }
            .strong-glow {
                filter: drop-shadow(0 0 12px rgba(212, 175, 55, 0.45));
            }
            .top-highlight {
                position: absolute;
                top: 5%;
                left: 5%;
                width: 40%;
                height: 40%;
                border-radius: 50%;
                background: radial-gradient(circle at center, rgba(255,255,255,0.3) 0%, rgba(255,255,255,0) 65%);
                z-index: 35;
                pointer-events: none;
            }
            .rotation-mode-btn.active {
                background-color: rgba(212, 175, 55, 0.15);
                border-color: rgba(212, 175, 55, 0.5);
            }
        }
    </style>
</head>
<body class="bg-gradient-to-br from-gray-100 to-gray-200 dark:from-gray-900 dark:to-gray-800 min-h-screen flex flex-col items-center p-4 transition-colors duration-1000">
    <div class="max-w-4xl w-full mx-auto">
        <!-- 标题 -->
        <header class="text-center my-6 relative z-10">
            <h1 class="text-[clamp(1.8rem,5vw,3rem)] font-kai font-bold text-transparent bg-clip-text bg-gradient-to-r from-gray-800 to-gray-600 dark:from-white dark:to-gray-300">
                多轴旋转太极图
            </h1>
            <p class="text-gray-600 dark:text-gray-400 mt-2 font-song">
                支持多种旋转模式 · 自由视角控制
            </p>
        </header>
        
        <!-- 主内容区 - 多轴旋转效果 -->
        <div class="perspective-strong w-full max-w-2xl mx-auto mb-8">
            <div id="rotation-container" class="preserve-3d relative w-full aspect-square">
                <!-- 坐标轴指示器 -->
                <div class="axis-indicator axis-x"></div>
                <div class="axis-indicator axis-y"></div>
                <div class="axis-z"></div>
                
                <!-- 底部阴影 -->
                <div class="base-shadow"></div>
                
                <!-- 扁圆柱体容器 -->
                <div class="cylinder-main" id="cylinder">
                    <!-- 圆柱顶面 -->
                    <div class="cylinder-top">
                        <div class="top-highlight"></div>
                        
                        <!-- 太极图主体 -->
                        <div class="absolute inset-0 flex items-center justify-center">
                            <div class="w-[70%] h-[70%] relative strong-glow">
                                <svg class="w-full h-full" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
                                    <!-- 阴鱼 (黑色) 带渐变 -->
                                    <path fill="url(#yinGradient)" d="M100,0 C155.2,0 200,44.8 200,100 C200,155.2 155.2,200 100,200 C44.8,200 0,155.2 0,100 C0,44.8 44.8,0 100,0 Z M100,50 C77.9,50 60,67.9 60,90 C60,112.1 77.9,130 100,130 C100,130 100,100 100,100 C100,100 100,50 100,50 Z" />
                                    <!-- 阳鱼 (白色) 带渐变 -->
                                    <path fill="url(#yangGradient)" d="M100,0 C100,0 100,25 100,50 C100,75 100,100 100,100 C100,100 100,130 100,130 C122.1,130 140,112.1 140,90 C140,67.9 122.1,50 100,50 C100,25 100,0 100,0 Z" />
                                    <!-- 鱼眼 -->
                                    <circle cx="100" cy="50" r="10" fill="#fff" />
                                    <circle cx="100" cy="50" r="3" fill="#d4af37" />
                                    <circle cx="100" cy="150" r="10" fill="#000" />
                                    <circle cx="100" cy="150" r="3" fill="#d4af37" />
                                    <!-- 渐变定义 -->
                                    <defs>
                                        <linearGradient id="yinGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                                            <stop offset="0%" stop-color="#222" />
                                            <stop offset="100%" stop-color="#000" />
                                        </linearGradient>
                                        <linearGradient id="yangGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                                            <stop offset="0%" stop-color="#fff" />
                                            <stop offset="100%" stop-color="#eee" />
                                        </linearGradient>
                                    </defs>
                                </svg>
                            </div>
                        </div>
                        
                        <!-- 八卦符号 -->
                        <div class="absolute inset-0">
                            <!-- 乾卦 (顶部) -->
                            <div class="bagua-item" style="top: 10%; left: 50%; transform: translate3d(-50%, 0, 5px); color: #000;">
                                <div class="trigram mx-auto">
                                    <div class="trigram-line top"></div>
                                    <div class="trigram-line middle"></div>
                                    <div class="trigram-line bottom"></div>
                                </div>
                                <div class="mt-1 font-song text-sm">乾(天)</div>
                            </div>
                            
                            <!-- 兑卦 (右上) -->
                            <div class="bagua-item" style="top: 25%; left: 82%; transform: translate3d(-50%, 0, 5px); color: #000;">
                                <div class="trigram mx-auto">
                                    <div class="trigram-line top"></div>
                                    <div class="trigram-line middle"></div>
                                    <div class="trigram-line bottom broken"></div>
                                </div>
                                <div class="mt-1 font-song text-sm">兑(泽)</div>
                            </div>
                            
                            <!-- 离卦 (右中) -->
                            <div class="bagua-item" style="top: 50%; left: 88%; transform: translate3d(-50%, -50%, 5px); color: #000;">
                                <div class="trigram mx-auto">
                                    <div class="trigram-line top"></div>
                                    <div class="trigram-line middle broken"></div>
                                    <div class="trigram-line bottom"></div>
                                </div>
                                <div class="mt-1 font-song text-sm">离(火)</div>
                            </div>
                            
                            <!-- 震卦 (右下) -->
                            <div class="bagua-item" style="top: 75%; left: 82%; transform: translate3d(-50%, 0, 5px); color: #000;">
                                <div class="trigram mx-auto">
                                    <div class="trigram-line top broken"></div>
                                    <div class="trigram-line middle"></div>
                                    <div class="trigram-line bottom"></div>
                                </div>
                                <div class="mt-1 font-song text-sm">震(雷)</div>
                            </div>
                            
                            <!-- 坤卦 (底部) -->
                            <div class="bagua-item" style="top: 90%; left: 50%; transform: translate3d(-50%, 0, 5px); color: #000;">
                                <div class="trigram mx-auto">
                                    <div class="trigram-line top broken"></div>
                                    <div class="trigram-line middle broken"></div>
                                    <div class="trigram-line bottom broken"></div>
                                </div>
                                <div class="mt-1 font-song text-sm">坤(地)</div>
                            </div>
                            
                            <!-- 艮卦 (左下) -->
                            <div class="bagua-item" style="top: 75%; left: 18%; transform: translate3d(-50%, 0, 5px); color: #000;">
                                <div class="trigram mx-auto">
                                    <div class="trigram-line top"></div>
                                    <div class="trigram-line middle broken"></div>
                                    <div class="trigram-line bottom broken"></div>
                                </div>
                                <div class="mt-1 font-song text-sm">艮(山)</div>
                            </div>
                            
                            <!-- 坎卦 (左中) -->
                            <div class="bagua-item" style="top: 50%; left: 12%; transform: translate3d(-50%, -50%, 5px); color: #000;">
                                <div class="trigram mx-auto">
                                    <div class="trigram-line top broken"></div>
                                    <div class="trigram-line middle"></div>
                                    <div class="trigram-line bottom broken"></div>
                                </div>
                                <div class="mt-1 font-song text-sm">坎(水)</div>
                            </div>
                            
                            <!-- 巽卦 (左上) -->
                            <div class="bagua-item" style="top: 25%; left: 18%; transform: translate3d(-50%, 0, 5px); color: #000;">
                                <div class="trigram mx-auto">
                                    <div class="trigram-line top broken"></div>
                                    <div class="trigram-line middle broken"></div>
                                    <div class="trigram-line bottom"></div>
                                </div>
                                <div class="mt-1 font-song text-sm">巽(风)</div>
                            </div>
                        </div>
                    </div>
                    
                    <!-- 圆柱侧面 -->
                    <div class="cylinder-side"></div>
                    
                    <!-- 圆柱底面 -->
                    <div class="cylinder-bottom backface-hidden">
                        <div class="absolute inset-0 flex items-center justify-center">
                            <div class="w-[65%] h-[65%] border-2 border-taiji-gold/30 rounded-full flex items-center justify-center">
                                <div class="w-[35%] h-[35%] border-2 border-taiji-gold/20 rounded-full"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 旋转模式选择 -->
        <div class="bg-white/60 dark:bg-gray-800/60 backdrop-blur-md rounded-xl p-5 shadow-lg max-w-xl mx-auto mb-6 transition-all duration-500">
            <h2 class="text-center text-lg font-kai text-gray-800 dark:text-white mb-4">
                <i class="fa fa-refresh text-taiji-gold mr-2"></i>旋转模式
            </h2>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
                <button id="mode-z" class="rotation-mode-btn flex flex-col items-center justify-center p-3 border border-gray-200 dark:border-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 rounded-lg transition-all duration-300 active">
                    <i class="fa fa-circle-o text-xl text-taiji-gold mb-1"></i>
                    <span class="text-sm">Z轴旋转</span>
                </button>
                <button id="mode-x" class="rotation-mode-btn flex flex-col items-center justify-center p-3 border border-gray-200 dark:border-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 rounded-lg transition-all duration-300">
                    <i class="fa fa-arrows-h text-xl text-taiji-gold mb-1"></i>
                    <span class="text-sm">X轴旋转</span>
                </button>
                <button id="mode-y" class="rotation-mode-btn flex flex-col items-center justify-center p-3 border border-gray-200 dark:border-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 rounded-lg transition-all duration-300">
                    <i class="fa fa-arrows-v text-xl text-taiji-gold mb-1"></i>
                    <span class="text-sm">Y轴旋转</span>
                </button>
                <button id="mode-compound" class="rotation-mode-btn flex flex-col items-center justify-center p-3 border border-gray-200 dark:border-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 rounded-lg transition-all duration-300">
                    <i class="fa fa-cubes text-xl text-taiji-gold mb-1"></i>
                    <span class="text-sm">复合旋转</span>
                </button>
            </div>
        </div>
        
        <!-- 控制按钮 -->
        <div class="bg-white/60 dark:bg-gray-800/60 backdrop-blur-md rounded-xl p-5 shadow-lg max-w-xl mx-auto mb-8 transition-all duration-500">
            <h2 class="text-center text-lg font-kai text-gray-800 dark:text-white mb-4">
                <i class="fa fa-sliders text-taiji-gold mr-2"></i>旋转控制
            </h2>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-4">
                <button id="rotate-toggle" class="flex flex-col items-center justify-center p-3 bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 rounded-lg transition-all duration-300">
                    <i class="fa fa-play text-xl text-taiji-gold mb-1"></i>
                    <span class="text-sm">开始</span>
                </button>
                <button id="direction-toggle" class="flex flex-col items-center justify-center p-3 bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 rounded-lg transition-all duration-300">
                    <i class="fa fa-rotate-right text-xl text-taiji-gold mb-1"></i>
                    <span class="text-sm">顺时针</span>
                </button>
                <button id="theme-toggle" class="flex flex-col items-center justify-center p-3 bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 rounded-lg transition-all duration-300">
                    <i class="fa fa-moon-o text-xl text-taiji-gold mb-1"></i>
                    <span class="text-sm">主题</span>
                </button>
                <button id="reset-view" class="flex flex-col items-center justify-center p-3 bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 rounded-lg transition-all duration-300">
                    <i class="fa fa-undo text-xl text-taiji-gold mb-1"></i>
                    <span class="text-sm">重置</span>
                </button>
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm text-gray-600 dark:text-gray-400 mb-2">
                        <i class="fa fa-tachometer text-taiji-gold mr-1"></i>旋转速度
                    </label>
                    <input type="range" id="speed-control" min="1" max="10" value="3" 
                           class="w-full h-2 bg-gray-200 dark:bg-gray-700 rounded-lg appearance-none cursor-pointer accent-taiji-gold">
                </div>
                <div>
                    <label class="block text-sm text-gray-600 dark:text-gray-400 mb-2">
                        <i class="fa fa-search text-taiji-gold mr-1"></i>视角倾斜度
                    </label>
                    <input type="range" id="tilt-control" min="5" max="60" value="25" 
                           class="w-full h-2 bg-gray-200 dark:bg-gray-700 rounded-lg appearance-none cursor-pointer accent-taiji-gold">
                </div>
            </div>
        </div>
    </div>

    <script>
        // DOM元素
        const rotationContainer = document.getElementById('rotation-container');
        const rotateToggle = document.getElementById('rotate-toggle');
        const directionToggle = document.getElementById('direction-toggle');
        const themeToggle = document.getElementById('theme-toggle');
        const resetView = document.getElementById('reset-view');
        const speedControl = document.getElementById('speed-control');
        const tiltControl = document.getElementById('tilt-control');
        const modeButtons = {
            z: document.getElementById('mode-z'),
            x: document.getElementById('mode-x'),
            y: document.getElementById('mode-y'),
            compound: document.getElementById('mode-compound')
        };
        const body = document.body;
        
        // 状态变量
        let isRotating = false;
        let rotationInterval;
        let rotationSpeed = 3;
        let rotationDirection = 1; // 1: 顺时针, -1: 逆时针
        let currentRotation = { x: 25, y: 0, z: 0 };
        let rotationMode = 'z'; // 默认Z轴旋转
        let isDragging = false;
        let startX, startY;
        let dragStartRotation;
        
        // 应用旋转
        function applyRotation() {
            rotationContainer.style.transform = `rotateX(${currentRotation.x}deg) rotateY(${currentRotation.y}deg) rotateZ(${currentRotation.z}deg)`;
        }
        
        // 切换旋转状态
        function toggleRotation() {
            if (isRotating) {
                clearInterval(rotationInterval);
                rotateToggle.innerHTML = `
                    <i class="fa fa-play text-xl text-taiji-gold mb-1"></i>
                    <span class="text-sm">开始</span>
                `;
            } else {
                startRotation();
                rotateToggle.innerHTML = `
                    <i class="fa fa-pause text-xl text-taiji-gold mb-1"></i>
                    <span class="text-sm">暂停</span>
                `;
            }
            isRotating = !isRotating;
        }
        
        // 开始旋转 - 根据当前模式
        function startRotation() {
            const interval = 100 - (rotationSpeed * 8);
            
            rotationInterval = setInterval(() => {
                switch(rotationMode) {
                    case 'x':
                        currentRotation.x = (currentRotation.x + rotationSpeed * 0.3 * rotationDirection) % 360;
                        break;
                    case 'y':
                        currentRotation.y = (currentRotation.y + rotationSpeed * 0.3 * rotationDirection) % 360;
                        break;
                    case 'z':
                        currentRotation.z = (currentRotation.z + rotationSpeed * 0.5 * rotationDirection) % 360;
                        break;
                    case 'compound':
                        // 复合旋转 - 多轴同时旋转，不同速度
                        currentRotation.x = (currentRotation.x + rotationSpeed * 0.15 * rotationDirection) % 360;
                        currentRotation.y = (currentRotation.y + rotationSpeed * 0.2 * -rotationDirection) % 360;
                        currentRotation.z = (currentRotation.z + rotationSpeed * 0.3 * rotationDirection) % 360;
                        break;
                }
                applyRotation();
            }, interval);
        }
        
        // 切换旋转方向
        function toggleDirection() {
            rotationDirection *= -1;
            
            directionToggle.innerHTML = `
                <i class="fa fa-rotate-${rotationDirection === 1 ? 'right' : 'left'} text-xl text-taiji-gold mb-1"></i>
                <span class="text-sm">${rotationDirection === 1 ? '顺时针' : '逆时针'}</span>
            `;
        }
        
        // 切换旋转模式
        function setRotationMode(mode) {
            // 更新按钮状态
            Object.keys(modeButtons).forEach(key => {
                modeButtons[key].classList.remove('active');
            });
            modeButtons[mode].classList.add('active');
            
            // 更新模式
            rotationMode = mode;
            
            // 如果正在旋转，重启旋转以应用新模式
            if (isRotating) {
                clearInterval(rotationInterval);
                startRotation();
            }
        }
        
        // 调整视角倾斜度
        function adjustTilt() {
            currentRotation.x = parseInt(tiltControl.value);
            applyRotation();
        }
        
        // 主题切换
        function toggleTheme() {
            const isDark = body.classList.toggle('dark');
            
            if (isDark) {
                themeToggle.innerHTML = `
                    <i class="fa fa-sun-o text-xl text-taiji-gold mb-1"></i>
                    <span class="text-sm">亮色</span>
                `;
            } else {
                themeToggle.innerHTML = `
                    <i class="fa fa-moon-o text-xl text-taiji-gold mb-1"></i>
                    <span class="text-sm">主题</span>
                `;
            }
        }
        
        // 重置视图
        function resetViewFunc() {
            if (isRotating) {
                toggleRotation();
            }
            
            currentRotation = { x: 25, y: 0, z: 0 };
            rotationSpeed = 3;
            rotationDirection = 1;
            rotationMode = 'z';
            
            speedControl.value = 3;
            tiltControl.value = 25;
            
            applyRotation();
            setRotationMode('z');
            
            directionToggle.innerHTML = `
                <i class="fa fa-rotate-right text-xl text-taiji-gold mb-1"></i>
                <span class="text-sm">顺时针</span>
            `;
        }
        
        // 速度控制
        function updateSpeed() {
            rotationSpeed = parseInt(speedControl.value);
            
            if (isRotating) {
                clearInterval(rotationInterval);
                startRotation();
            }
        }
        
        // 鼠标拖拽旋转 - 自由视角
        function handleMouseDown(e) {
            isDragging = true;
            startX = e.clientX;
            startY = e.clientY;
            dragStartRotation = { ...currentRotation };
            rotationContainer.style.cursor = 'grabbing';
            
            if (isRotating) {
                clearInterval(rotationInterval);
                isRotating = false;
                rotateToggle.innerHTML = `
                    <i class="fa fa-play text-xl text-taiji-gold mb-1"></i>
                    <span class="text-sm">开始</span>
                `;
            }
        }
        
        function handleMouseMove(e) {
            if (!isDragging) return;
            
            const deltaX = e.clientX - startX;
            const deltaY = e.clientY - startY;
            
            // 自由旋转 - 同时影响Y轴和X轴
            currentRotation.y = dragStartRotation.y + deltaX * 0.5;
            currentRotation.x = dragStartRotation.x - deltaY * 0.5;
            
            // 限制X轴旋转角度，避免过度翻转
            currentRotation.x = Math.max(-85, Math.min(85, currentRotation.x));
            
            applyRotation();
            // 更新倾斜度滑块
            tiltControl.value = currentRotation.x;
        }
        
        function handleMouseUp() {
            isDragging = false;
            rotationContainer.style.cursor = 'grab';
        }
        
        // 事件监听
        rotateToggle.addEventListener('click', toggleRotation);
        directionToggle.addEventListener('click', toggleDirection);
        themeToggle.addEventListener('click', toggleTheme);
        resetView.addEventListener('click', resetViewFunc);
        speedControl.addEventListener('input', updateSpeed);
        tiltControl.addEventListener('input', adjustTilt);
        
        // 旋转模式按钮
        modeButtons.z.addEventListener('click', () => setRotationMode('z'));
        modeButtons.x.addEventListener('click', () => setRotationMode('x'));
        modeButtons.y.addEventListener('click', () => setRotationMode('y'));
        modeButtons.compound.addEventListener('click', () => setRotationMode('compound'));
        
        // 鼠标拖拽事件
        rotationContainer.addEventListener('mousedown', handleMouseDown);
        document.addEventListener('mousemove', handleMouseMove);
        document.addEventListener('mouseup', handleMouseUp);
        document.addEventListener('mouseleave', handleMouseUp);
        
        // 初始化
        window.addEventListener('load', () => {
            rotationContainer.style.cursor = 'grab';
            applyRotation();
            
            // 初始动画
            rotationContainer.style.opacity = '0';
            rotationContainer.style.transform = `rotateX(25deg) rotateY(0deg) rotateZ(0deg) scale(0.9)`;
            
            setTimeout(() => {
                rotationContainer.style.transition = 'opacity 1.2s ease, transform 1.2s cubic-bezier(0.34, 1.56, 0.64, 1)';
                rotationContainer.style.opacity = '1';
                rotationContainer.style.transform = `rotateX(25deg) rotateY(0deg) rotateZ(0deg) scale(1)`;
            }, 200);
        });
    </script>
</body>
</html>
