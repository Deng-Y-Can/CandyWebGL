                                        <span class="property-label">Width:</span>
                                        <input type="number" id="width" class="property-input" value="${obj.width.toFixed(2)}" step="0.1" min="0.1">
                                    </div>
                                    <div class="property-row">
                                        <span class="property-label">Height:</span>
                                        <input type="number" id="height" class="property-input" value="${obj.height.toFixed(2)}" step="0.1" min="0.1">
                                    </div>
                                    <div class="property-row">
                                        <span class="property-label">Corner Radius:</span>
                                        <input type="number" id="corner-radius" class="property-input" value="0" step="0.1" min="0">
                                    </div>
                                `;
                            break;

                        case 'circle':
                            typePanel.innerHTML = `
                                    <h4 style="color: #b0b8c8; margin-bottom: 10px;">Circle Properties</h4>
                                    <div class="property-row">
                                        <span class="property-label">Radius:</span>
                                        <input type="number" id="radius" class="property-input" value="${obj.radius.toFixed(2)}" step="0.1" min="0.1">
                                    </div>
                                    <div class="property-row">
                                        <span class="property-label">Start Angle:</span>
                                        <input type="number" id="start-angle" class="property-input" value="0" step="1" min="0" max="360">
                                    </div>
                                    <div class="property-row">
                                        <span class="property-label">End Angle:</span>
                                        <input type="number" id="end-angle" class="property-input" value="360" step="1" min="0" max="360">
                                    </div>
                                `;
                            break;

                        case 'polygon':
                            typePanel.innerHTML = `
                                    <h4 style="color: #b0b8c8; margin-bottom: 10px;">Polygon Properties</h4>
                                    <div class="property-row">
                                        <span class="property-label">Radius:</span>
                                        <input type="number" id="poly-radius" class="property-input" value="${obj.radius.toFixed(2)}" step="0.1" min="0.1">
                                    </div>
                                    <div class="property-row">
                                        <span class="property-label">Sides:</span>
                                        <input type="number" id="sides" class="property-input" value="${obj.sides}" step="1" min="3" max="20">
                                    </div>
                                `;
                            break;
                    }
                } else {
                    panel.style.display = 'none';
                }
            }

            updateMouseCoordinates(worldPos, screenPos) {
                document.getElementById('world-x').textContent = worldPos.x.toFixed(2);
                document.getElementById('world-y').textContent = worldPos.y.toFixed(2);

                if (screenPos) {
                    document.getElementById('screen-x').textContent = Math.round(screenPos.x);
                    document.getElementById('screen-y').textContent = Math.round(screenPos.y);
                }
            }

            updateStatus(message) {
                document.getElementById('status-message').textContent = message;
            }
        }

        // ==================== 启动应用 ====================
        let cadApp;

        window.addEventListener('load', () => {
            try {
                cadApp = new ProfessionalCAD();
                console.log('Professional CAD Application started successfully');
            } catch (error) {
                console.error('Failed to start application:', error);
                document.body.innerHTML = `
                        <div style="
                            position: fixed;
                            top: 0;
                            left: 0;
                            width: 100%;
                            height: 100%;
                            background: #1a1a2e;
                            color: #ff6b6b;
                            display: flex;
                            flex-direction: column;
                            justify-content: center;
                            align-items: center;
                            font-family: Arial, sans-serif;
                            padding: 20px;
                            text-align: center;
                        ">
                            <h1 style="font-size: 24px; margin-bottom: 20px;">Application Error</h1>
                            <p style="margin-bottom: 20px; max-width: 600px;">${error.message}</p>
                            <p style="margin-bottom: 30px; color: #aaa;">Please ensure your browser supports Canvas 2D</p>
                            <button onclick="location.reload()" style="
                                background: #007acc;
                                color: white;
                                border: none;
                                padding: 10px 20px;
                                border-radius: 5px;
                                cursor: pointer;
                                font-size: 16px;
                            ">
                                Reload Application
                            </button>
                        </div>
                    `;
            }
        });

    </script>
</body>
</html>
