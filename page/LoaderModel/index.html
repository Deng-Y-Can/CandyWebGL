<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PLY Viewer (WebGL1/2) - Import / Orbit / Measure / Axis Color</title>
    <style>
        html, body {
            height: 100%;
            margin: 0;
            background: #0b0f14;
            overflow: hidden;
            font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Arial;
        }

        #wrap {
            position: relative;
            width: 100%;
            height: 100%;
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        .ui {
            position: absolute;
            left: 12px;
            top: 12px;
            background: rgba(12,16,22,.82);
            border: 1px solid rgba(255,255,255,.08);
            border-radius: 12px;
            padding: 12px 12px;
            color: rgba(255,255,255,.92);
            backdrop-filter: blur(10px);
            min-width: 340px;
            box-shadow: 0 10px 30px rgba(0,0,0,.35);
            user-select: none;
        }

        .row {
            display: flex;
            gap: 10px;
            align-items: center;
            margin: 8px 0;
            flex-wrap: wrap;
        }

            .row > label {
                width: 96px;
                opacity: .85;
                font-size: 12px;
            }

        input[type="file"] {
            color: rgba(255,255,255,.9);
        }

        select, button, input[type="range"], input[type="number"] {
            background: rgba(255,255,255,.06);
            color: rgba(255,255,255,.92);
            border: 1px solid rgba(255,255,255,.12);
            border-radius: 10px;
            padding: 8px 10px;
            outline: none;
        }

        button {
            cursor: pointer;
        }

            button.primary {
                background: rgba(60,140,255,.22);
                border-color: rgba(60,140,255,.35);
            }

            button.danger {
                background: rgba(255,90,90,.18);
                border-color: rgba(255,90,90,.28);
            }

            button:disabled {
                opacity: .45;
                cursor: not-allowed;
            }

        .hint {
            font-size: 12px;
            opacity: .75;
            line-height: 1.35;
            margin-top: 6px;
        }

        .stats {
            font-size: 12px;
            opacity: .85;
            line-height: 1.35;
        }

        .sep {
            height: 1px;
            background: rgba(255,255,255,.08);
            margin: 10px 0;
        }

        .measure-list {
            max-height: 130px;
            overflow: auto;
            border: 1px solid rgba(255,255,255,.08);
            border-radius: 10px;
            padding: 6px 8px;
            background: rgba(255,255,255,.04);
            font-size: 12px;
        }

        .measure-item {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            padding: 4px 0;
            border-bottom: 1px dashed rgba(255,255,255,.08);
        }

            .measure-item:last-child {
                border-bottom: none;
            }

        .toast {
            position: absolute;
            right: 12px;
            top: 12px;
            background: rgba(20,26,36,.90);
            border: 1px solid rgba(255,255,255,.10);
            border-radius: 12px;
            padding: 10px 12px;
            color: rgba(255,255,255,.92);
            max-width: 520px;
            line-height: 1.35;
            box-shadow: 0 10px 30px rgba(0,0,0,.35);
            display: none;
            white-space: pre-wrap;
        }
    </style>
</head>

<body>
    <div id="wrap">
        <canvas id="c"></canvas>

        <div class="ui">
            <div class="row" style="justify-content:space-between;">
                <div style="font-weight:600;">PLY 导入 / 旋转平移缩放 / 测量 / 沿轴染色</div>
                <button id="btnReset" class="primary">重置视角</button>
            </div>

            <div class="row">
                <label>导入 PLY</label>
                <input id="file" type="file" accept=".ply" />
                <button id="btnDemo" title="如果你有本地 ply，可以忽略这个按钮">加载 URL</button>
            </div>

            <div class="row">
                <label>显示模式</label>
                <select id="viewMode">
                    <option value="auto" selected>自动（有面=网格 / 无面=点云）</option>
                    <option value="points">强制点云</option>
                    <option value="triangles">强制网格</option>
                </select>

                <label style="width:auto;">点大小</label>
                <input id="pointSize" type="range" min="1" max="12" step="0.5" value="2.5" />
                <span id="pointSizeVal" style="font-size:12px; opacity:.85;">2.5</span>
            </div>

            <div class="row">
                <label>沿轴染色</label>
                <select id="axisColor">
                    <option value="none" selected>不染色（保留PLY颜色/白色）</option>
                    <option value="x">按 X</option>
                    <option value="y">按 Y</option>
                    <option value="z">按 Z</option>
                </select>

                <button id="btnApplyAxis">应用</button>
                <label style="width:auto;">
                    <input id="fakeLight" type="checkbox" checked />
                    <span style="font-size:12px; opacity:.85;">假光照</span>
                </label>
            </div>

            <div class="row">
                <label>测量</label>
                <button id="btnMeasure" class="primary">开启测量</button>
                <button id="btnClearMeasure" class="danger">清空</button>

                <label style="width:auto;">
                    <input id="snapPixels" type="number" min="2" max="60" value="10" style="width:72px; padding:6px 8px;">
                    <span style="font-size:12px; opacity:.85;">像素吸附</span>
                </label>
            </div>

            <div class="measure-list" id="measureList"></div>

            <div class="sep"></div>
            <div class="stats" id="stats">
                未加载模型
            </div>

            <div class="hint">
                操作：
                <br>• 左键拖动：旋转
                <br>• 右键拖动 / Shift+左键：平移
                <br>• 滚轮：缩放（相机距离）
                <br>• 测量开启时：左键点选两个点生成一条测量线
            </div>
        </div>

        <div class="toast" id="toast"></div>
    </div>

    <script type="module">
        import { vec3, vec4, mat3, mat4, mathf } from "./math-gl.js";
        import { GLDevice, Renderer, Scene, Program, Mesh, Material, Model } from "./webgl-runtime.js";
        import { parsePLY } from "./ply-importer.js";

        // -----------------------
        // Toast
        // -----------------------
        const toastEl = document.getElementById("toast");
        let toastTimer = null;
        function toast(msg, ms = 2600) {
            toastEl.textContent = msg;
            toastEl.style.display = "block";
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => toastEl.style.display = "none", ms);
        }

        // -----------------------
        // BasicCamera（避免依赖 runtime Camera 的 TRS）
        // -----------------------
        class BasicCamera {
            constructor() {
                this.projectionMatrix = mat4.create();
                this.viewMatrix = mat4.create();
                this.viewProjectionMatrix = mat4.create();

                this.eye = vec3.fromValues(0, 0, 3);
                this.target = vec3.fromValues(0, 0, 0);
                this.up = vec3.fromValues(0, 1, 0);

                this.fovY = mathf.degToRad ? mathf.degToRad(60) : (60 * Math.PI / 180);
                this.near = 0.01;
                this.far = 5000;
                this.aspect = 1;
                this._dirty = true;
            }
            setPerspective(fovY, aspect, near, far) {
                this.fovY = fovY;
                this.aspect = aspect;
                this.near = near;
                this.far = far;
                this._dirty = true;
            }
            lookAt(eye, target, up) {
                vec3.copy(this.eye, eye);
                vec3.copy(this.target, target);
                vec3.copy(this.up, up);
                this._dirty = true;
            }
            updateMatrices() {
                if (!this._dirty) return;
                mat4.perspective(this.projectionMatrix, this.fovY, this.aspect, this.near, this.far);
                mat4.lookAt(this.viewMatrix, this.eye, this.target, this.up);
                mat4.mul(this.viewProjectionMatrix, this.projectionMatrix, this.viewMatrix);
                this._dirty = false;
            }
        }

        // -----------------------
        // Orbit Controls
        // -----------------------
        class OrbitControls {
            constructor(canvas, camera) {
                this.canvas = canvas;
                this.camera = camera;

                this.target = vec3.fromValues(0, 0, 0);
                this.distance = 3.0;
                this.yaw = 0.0;     // around Y
                this.pitch = 0.0;   // up/down

                this._drag = false;
                this._mode = "rotate"; // rotate | pan
                this._lastX = 0;
                this._lastY = 0;

                this.minDistance = 0.05;
                this.maxDistance = 1e6;

                this._bind();
                this.updateCamera();
            }

            setFromBounds(bbox) {
                const c = vec3.fromValues(
                    (bbox.min[0] + bbox.max[0]) * 0.5,
                    (bbox.min[1] + bbox.max[1]) * 0.5,
                    (bbox.min[2] + bbox.max[2]) * 0.5
                );
                vec3.copy(this.target, c);

                const dx = bbox.max[0] - bbox.min[0];
                const dy = bbox.max[1] - bbox.min[1];
                const dz = bbox.max[2] - bbox.min[2];
                const diag = Math.max(1e-6, Math.hypot(dx, dy, dz));
                this.distance = diag * 1.8;

                // 一个舒服的初始角度
                this.yaw = Math.PI * 0.25;
                this.pitch = Math.PI * 0.12;

                this.updateCamera();
            }

            _bind() {
                // 禁用右键菜单
                this.canvas.addEventListener("contextmenu", (e) => e.preventDefault());

                this.canvas.addEventListener("mousedown", (e) => {
                    this._drag = true;
                    this._lastX = e.clientX;
                    this._lastY = e.clientY;
                    // 右键 or shift+左键 => pan
                    const isPan = (e.button === 2) || (e.button === 0 && e.shiftKey);
                    this._mode = isPan ? "pan" : "rotate";
                });

                window.addEventListener("mouseup", () => { this._drag = false; });

                window.addEventListener("mousemove", (e) => {
                    if (!this._drag) return;
                    const dx = e.clientX - this._lastX;
                    const dy = e.clientY - this._lastY;
                    this._lastX = e.clientX;
                    this._lastY = e.clientY;

                    if (this._mode === "rotate") {
                        const rotSpeed = 0.005;
                        this.yaw -= dx * rotSpeed;
                        this.pitch -= dy * rotSpeed;
                        const lim = Math.PI / 2 - 0.01;
                        this.pitch = Math.max(-lim, Math.min(lim, this.pitch));
                    } else {
                        // pan：按距离缩放平移速度
                        const panSpeed = this.distance * 0.0012;
                        const dir = this._getDir();
                        const right = vec3.create();
                        vec3.cross(right, dir, vec3.fromValues(0, 1, 0));
                        const rl = Math.hypot(right[0], right[1], right[2]);
                        if (rl > 1e-6) { right[0] /= rl; right[1] /= rl; right[2] /= rl; }

                        const up = vec3.create();
                        vec3.cross(up, right, dir);
                        const ul = Math.hypot(up[0], up[1], up[2]);
                        if (ul > 1e-6) { up[0] /= ul; up[1] /= ul; up[2] /= ul; }

                        // dx 向右为正，但我们希望拖动时“跟手”，所以取负
                        this.target[0] += (-dx * panSpeed) * right[0] + (dy * panSpeed) * up[0];
                        this.target[1] += (-dx * panSpeed) * right[1] + (dy * panSpeed) * up[1];
                        this.target[2] += (-dx * panSpeed) * right[2] + (dy * panSpeed) * up[2];
                    }

                    this.updateCamera();
                });

                this.canvas.addEventListener("wheel", (e) => {
                    e.preventDefault();
                    const s = Math.exp(e.deltaY * 0.001);
                    this.distance *= s;
                    this.distance = Math.max(this.minDistance, Math.min(this.maxDistance, this.distance));
                    this.updateCamera();
                }, { passive: false });
            }

            _getDir() {
                // dir = normalize(target - eye)；这里先算 eye
                const cp = Math.cos(this.pitch);
                const sp = Math.sin(this.pitch);
                const cy = Math.cos(this.yaw);
                const sy = Math.sin(this.yaw);

                // eye = target + distance * (cp*sy, sp, cp*cy)
                const ex = this.target[0] + this.distance * (cp * sy);
                const ey = this.target[1] + this.distance * (sp);
                const ez = this.target[2] + this.distance * (cp * cy);

                const dir = vec3.fromValues(this.target[0] - ex, this.target[1] - ey, this.target[2] - ez);
                const l = Math.hypot(dir[0], dir[1], dir[2]) || 1;
                dir[0] /= l; dir[1] /= l; dir[2] /= l;
                return dir;
            }

            updateCamera() {
                const cp = Math.cos(this.pitch);
                const sp = Math.sin(this.pitch);
                const cy = Math.cos(this.yaw);
                const sy = Math.sin(this.yaw);

                const eye = vec3.fromValues(
                    this.target[0] + this.distance * (cp * sy),
                    this.target[1] + this.distance * (sp),
                    this.target[2] + this.distance * (cp * cy)
                );
                this.camera.lookAt(eye, this.target, vec3.fromValues(0, 1, 0));
            }
        }

        // -----------------------
        // Shaders（点云 / 网格 / 线）
        // -----------------------
        const ShaderLib = {
            Points: {
                vs100: `
precision highp float;
attribute vec3 aPosition;
attribute vec4 aColor;
uniform mat4 uMVP;
uniform float uPointSize;
varying vec4 vColor;
void main(){
          vColor = aColor;
          gl_Position = uMVP * vec4(aPosition, 1.0);
          gl_PointSize = uPointSize;
}
`,
                fs100: `
precision highp float;
varying vec4 vColor;
uniform vec4 uColor;
uniform float uRoundPoints;
void main(){
          vec4 c = vColor * uColor;
          if (uRoundPoints > 0.5) {
            vec2 p = gl_PointCoord*2.0 - 1.0;
            if (dot(p,p) > 1.0) discard;
          }
          gl_FragColor = c;
}
`,
                vs300: `#version 300 es
precision highp float;
in vec3 aPosition;
in vec4 aColor;
uniform mat4 uMVP;
uniform float uPointSize;
out vec4 vColor;
void main(){
          vColor = aColor;
          gl_Position = uMVP * vec4(aPosition, 1.0);
          gl_PointSize = uPointSize;
}
`,
                fs300: `#version 300 es
precision highp float;
in vec4 vColor;
uniform vec4 uColor;
uniform float uRoundPoints;
out vec4 outColor;
void main(){
          vec4 c = vColor * uColor;
          if (uRoundPoints > 0.5) {
            vec2 p = gl_PointCoord*2.0 - 1.0;
            if (dot(p,p) > 1.0) discard;
          }
          outColor = c;
}
`,
            },

            Mesh: {
                vs100: `
precision highp float;
attribute vec3 aPosition;
attribute vec3 aNormal;
attribute vec4 aColor;
uniform mat4 uMVP;
uniform mat3 uNormalMat;
varying vec4 vColor;
varying vec3 vN;
void main(){
          vColor = aColor;
          vN = normalize(uNormalMat * aNormal);
          gl_Position = uMVP * vec4(aPosition, 1.0);
}
`,
                fs100: `
precision highp float;
varying vec4 vColor;
varying vec3 vN;
uniform vec4 uColor;
uniform float uUseFakeLight;
void main(){
          vec4 c = vColor * uColor;
          if (uUseFakeLight > 0.5) {
            vec3 L = normalize(vec3(0.35, 0.85, 0.55));
            float ndl = max(dot(normalize(vN), L), 0.0);
            c.rgb *= (0.22 + 0.78*ndl);
          }
          gl_FragColor = c;
}
`,
                vs300: `#version 300 es
precision highp float;
in vec3 aPosition;
in vec3 aNormal;
in vec4 aColor;
uniform mat4 uMVP;
uniform mat3 uNormalMat;
out vec4 vColor;
out vec3 vN;
void main(){
          vColor = aColor;
          vN = normalize(uNormalMat * aNormal);
          gl_Position = uMVP * vec4(aPosition, 1.0);
}
`,
                fs300: `#version 300 es
precision highp float;
in vec4 vColor;
in vec3 vN;
uniform vec4 uColor;
uniform float uUseFakeLight;
out vec4 outColor;
void main(){
          vec4 c = vColor * uColor;
          if (uUseFakeLight > 0.5) {
            vec3 L = normalize(vec3(0.35, 0.85, 0.55));
            float ndl = max(dot(normalize(vN), L), 0.0);
            c.rgb *= (0.22 + 0.78*ndl);
          }
          outColor = c;
}
`,
            },

            Lines: {
                vs100: `
precision highp float;
attribute vec3 aPosition;
uniform mat4 uMVP;
void main(){
          gl_Position = uMVP * vec4(aPosition, 1.0);
}
`,
                fs100: `
precision highp float;
uniform vec4 uColor;
void main(){ gl_FragColor = uColor; }
`,
                vs300: `#version 300 es
precision highp float;
in vec3 aPosition;
uniform mat4 uMVP;
void main(){ gl_Position = uMVP * vec4(aPosition, 1.0); }
`,
                fs300: `#version 300 es
precision highp float;
uniform vec4 uColor;
out vec4 outColor;
void main(){ outColor = uColor; }
`,
            }
        };

        // -----------------------
        // Setup GL / Scene / Renderer
        // -----------------------
        const canvas = document.getElementById("c");
        const device = GLDevice.createFromCanvas(canvas, { antialias: true, alpha: false });
        const gl = device.gl;

        const renderer = new Renderer(device);
        const scene = new Scene();
        scene.backgroundColor = vec4.fromValues(0.05, 0.06, 0.075, 1);

        const camera = new BasicCamera();

        function resize() {
            renderer.resizeToDisplaySize(canvas);
            camera.setPerspective(camera.fovY, canvas.width / canvas.height, 0.01, 5000);
        }
        window.addEventListener("resize", resize);
        resize();

        // Programs（缓存一次）
        const progPoints = Program.fromSources(device, ShaderLib.Points);
        const progMesh = Program.fromSources(device, ShaderLib.Mesh);
        const progLines = Program.fromSources(device, ShaderLib.Lines);

        // 当前模型
        let plyModel = null;
        let plyCPU = null; // {positions, normals, colors, indices, bbox, mode, ...}

        // -----------------------
        // Measurement overlay models
        // -----------------------
        const measurements = []; // {a:vec3, b:vec3, dist:number}
        let measureEnabled = false;
        let pendingPoint = null; // vec3 | null

        // Lines Model (all segments)
        const measureLineMesh = Mesh.fromData(device, {
            attributes: { aPosition: { data: new Float32Array(0), size: 3, usage: gl.DYNAMIC_DRAW } },
            indices: null,
            mode: gl.LINES
        });
        const measureLineMat = new Material(progLines, {
            depthTest: false, depthWrite: false, blend: true, cull: false,
            uniforms: { uColor: vec4.fromValues(0.95, 0.95, 0.2, 1.0) }
        });
        const measureLinesModel = new Model(measureLineMesh, measureLineMat, "measure-lines");
        scene.add(measureLinesModel);

        // Points Model (picked endpoints)
        const measurePointMesh = Mesh.fromData(device, {
            attributes: {
                aPosition: { data: new Float32Array(0), size: 3, usage: gl.DYNAMIC_DRAW },
                aColor: { data: new Float32Array(0), size: 4, usage: gl.DYNAMIC_DRAW }
            },
            indices: null,
            mode: gl.POINTS
        });
        const measurePointMat = new Material(progPoints, {
            depthTest: false, depthWrite: false, blend: true, cull: false,
            uniforms: {
                uColor: vec4.fromValues(1, 1, 1, 1),
                uPointSize: 9.0,
                uRoundPoints: 1.0
            }
        });
        const measurePointsModel = new Model(measurePointMesh, measurePointMat, "measure-points");
        scene.add(measurePointsModel);

        function updateMeasureMeshes() {
            // segments
            const segPos = new Float32Array(measurements.length * 2 * 3);
            for (let i = 0; i < measurements.length; i++) {
                const m = measurements[i];
                segPos.set(m.a, i * 6 + 0);
                segPos.set(m.b, i * 6 + 3);
            }
            // if pendingPoint exists, add a short cross?（简单起见，只画点）
            // endpoints
            const pts = [];
            const cols = [];
            for (const m of measurements) {
                pts.push(...m.a, ...m.b);
                cols.push(1, 0.35, 0.2, 1, 0.2, 0.75, 1, 1);
            }
            if (pendingPoint) {
                pts.push(...pendingPoint);
                cols.push(0.9, 0.9, 0.25, 1);
            }

            // 更新 line buffer
            const lineAttr = measureLineMesh.attributes.find(a => a.name === "aPosition");
            gl.bindBuffer(gl.ARRAY_BUFFER, lineAttr.buffer);
            gl.bufferData(gl.ARRAY_BUFFER, segPos, gl.DYNAMIC_DRAW);
            measureLineMesh.vertexCount = (segPos.length / 3) | 0;
            measureLineMesh.vao = null;

            // 更新 point buffer
            const pAttr = measurePointMesh.attributes.find(a => a.name === "aPosition");
            const cAttr = measurePointMesh.attributes.find(a => a.name === "aColor");
            gl.bindBuffer(gl.ARRAY_BUFFER, pAttr.buffer);
            gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(pts), gl.DYNAMIC_DRAW);
            gl.bindBuffer(gl.ARRAY_BUFFER, cAttr.buffer);
            gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(cols), gl.DYNAMIC_DRAW);
            measurePointMesh.vertexCount = (pts.length / 3) | 0;
            measurePointMesh.vao = null;

            renderMeasureList();
        }

        const listEl = document.getElementById("measureList");
        function renderMeasureList() {
            if (measurements.length === 0 && !pendingPoint) {
                listEl.innerHTML = `<div style="opacity:.65; padding:6px 2px;">暂无测量</div>`;
                return;
            }
            const rows = measurements.map((m, idx) => {
                const d = m.dist;
                return `<div class="measure-item">
                <div>#${idx + 1}</div>
                <div>${d.toFixed(6)}</div>
              </div>`;
            }).join("");
            const pending = pendingPoint ? `<div style="opacity:.75; padding:6px 2px;">已选 1 点，继续选第 2 点…</div>` : "";
            listEl.innerHTML = rows + pending;
        }
        renderMeasureList();

        // -----------------------
        // Axis coloring
        // -----------------------
        function colorRamp(t) {
            // 0..1: 蓝 -> 青 -> 绿 -> 黄 -> 红（简单但够用）
            t = Math.max(0, Math.min(1, t));
            const stops = [
                { t: 0.0, c: [0.10, 0.30, 1.00] },
                { t: 0.25, c: [0.10, 0.95, 1.00] },
                { t: 0.5, c: [0.20, 1.00, 0.25] },
                { t: 0.75, c: [1.00, 0.95, 0.10] },
                { t: 1.0, c: [1.00, 0.15, 0.10] },
            ];
            for (let i = 0; i < stops.length - 1; i++) {
                const a = stops[i], b = stops[i + 1];
                if (t >= a.t && t <= b.t) {
                    const u = (t - a.t) / (b.t - a.t);
                    return [
                        a.c[0] + (b.c[0] - a.c[0]) * u,
                        a.c[1] + (b.c[1] - a.c[1]) * u,
                        a.c[2] + (b.c[2] - a.c[2]) * u,
                        1.0
                    ];
                }
            }
            return [1, 1, 1, 1];
        }

        function ensureMeshColorAttribute(mesh, colorsFloat4) {
            let aColor = mesh.attributes.find(a => a.name === "aColor");
            if (!aColor) {
                const buf = gl.createBuffer();
                gl.bindBuffer(gl.ARRAY_BUFFER, buf);
                gl.bufferData(gl.ARRAY_BUFFER, colorsFloat4, gl.STATIC_DRAW);
                mesh.attributes.push({
                    name: "aColor", buffer: buf, size: 4,
                    type: gl.FLOAT, normalized: false, stride: 0, offset: 0, divisor: 0
                });
            } else {
                gl.bindBuffer(gl.ARRAY_BUFFER, aColor.buffer);
                gl.bufferData(gl.ARRAY_BUFFER, colorsFloat4, gl.STATIC_DRAW);
            }
            mesh.vao = null; // 强制重建 VAO
        }

        function applyAxisColor(axis) {
            if (!plyModel || !plyCPU) return;

            if (axis === "none") {
                // 恢复原始颜色：如果 PLY 没颜色，用白色
                const vCount = (plyCPU.positions.length / 3) | 0;
                const colors = plyCPU.colorsOriginal || plyCPU.colors || null;
                let out;
                if (colors) out = colors;
                else {
                    out = new Float32Array(vCount * 4);
                    for (let i = 0; i < vCount; i++) { out.set([1, 1, 1, 1], i * 4); }
                }
                ensureMeshColorAttribute(plyModel.mesh, out);
                toast("已恢复原始颜色（或白色）");
                return;
            }

            const ai = axis === "x" ? 0 : axis === "y" ? 1 : 2;
            const pos = plyCPU.positions;
            const vCount = (pos.length / 3) | 0;

            let min = Infinity, max = -Infinity;
            for (let i = 0; i < vCount; i++) {
                const v = pos[i * 3 + ai];
                if (v < min) min = v;
                if (v > max) max = v;
            }
            const span = Math.max(1e-9, max - min);

            const out = new Float32Array(vCount * 4);
            for (let i = 0; i < vCount; i++) {
                const t = (pos[i * 3 + ai] - min) / span;
                const c = colorRamp(t);
                out.set(c, i * 4);
            }
            ensureMeshColorAttribute(plyModel.mesh, out);
            toast(`已按 ${axis.toUpperCase()} 轴染色`);
        }

        // -----------------------
        // Picking（屏幕空间：O(N) 每次点击；用于测量足够）
        // -----------------------
        const _tmpMVP = mat4.create();
        const _tmpV4 = new Float32Array(4);
        const _tmpWorld = vec3.create();

        function mulMat4Vec4(out4, m, x, y, z, w) {
            out4[0] = m[0] * x + m[4] * y + m[8] * z + m[12] * w;
            out4[1] = m[1] * x + m[5] * y + m[9] * z + m[13] * w;
            out4[2] = m[2] * x + m[6] * y + m[10] * z + m[14] * w;
            out4[3] = m[3] * x + m[7] * y + m[11] * z + m[15] * w;
            return out4;
        }

        function pickVertexScreenSpace(mx, my, pixelThreshold = 10) {
            if (!plyModel || !plyCPU) return null;

            // MVP = VP * Model
            mat4.mul(_tmpMVP, camera.viewProjectionMatrix, plyModel.matrixWorld);

            const pos = plyCPU.positions;
            const vCount = (pos.length / 3) | 0;
            const w = canvas.width, h = canvas.height;

            let best = -1;
            let bestD2 = pixelThreshold * pixelThreshold;
            let bestDepth = Infinity;

            for (let i = 0; i < vCount; i++) {
                const x = pos[i * 3 + 0], y = pos[i * 3 + 1], z = pos[i * 3 + 2];
                mulMat4Vec4(_tmpV4, _tmpMVP, x, y, z, 1);
                const cw = _tmpV4[3];
                if (cw <= 1e-6) continue;

                const ndcX = _tmpV4[0] / cw;
                const ndcY = _tmpV4[1] / cw;
                const ndcZ = _tmpV4[2] / cw;

                // 视锥外的点不选
                if (ndcX < -1 || ndcX > 1 || ndcY < -1 || ndcY > 1 || ndcZ < -1 || ndcZ > 1) continue;

                const sx = (ndcX * 0.5 + 0.5) * w;
                const sy = (1 - (ndcY * 0.5 + 0.5)) * h;
                const dx = sx - mx;
                const dy = sy - my;
                const d2 = dx * dx + dy * dy;

                if (d2 < bestD2) {
                    // 深度更近优先（避免点云重叠时选到后面的）
                    const depth = ndcZ;
                    if (d2 < bestD2 - 1e-6 || depth < bestDepth) {
                        best = i;
                        bestD2 = d2;
                        bestDepth = depth;
                    }
                }
            }

            if (best < 0) return null;

            // local->world（当前 plyModel 默认世界矩阵通常是 identity，但这里做通用）
            const lx = pos[best * 3 + 0], ly = pos[best * 3 + 1], lz = pos[best * 3 + 2];
            // world = M * [l,1]
            mulMat4Vec4(_tmpV4, plyModel.matrixWorld, lx, ly, lz, 1);
            const iw = _tmpV4[3] || 1;
            _tmpWorld[0] = _tmpV4[0] / iw;
            _tmpWorld[1] = _tmpV4[1] / iw;
            _tmpWorld[2] = _tmpV4[2] / iw;
            return vec3.fromValues(_tmpWorld[0], _tmpWorld[1], _tmpWorld[2]);
        }

        // -----------------------
        // Load PLY and build Model
        // -----------------------
        async function loadPLYFromArrayBuffer(buffer, name = "PLY") {
            try {
                const viewMode = document.getElementById("viewMode").value;
                const parsed = parsePLY(buffer, {
                    _device: device,
                    computeNormals: true,
                    center: true,
                    scaleToUnit: true,
                    forceMode: viewMode === "auto" ? undefined : viewMode
                });

                // 缓存 CPU 数据
                plyCPU = parsed;
                plyCPU.colorsOriginal = parsed.colors ? parsed.colors.slice() : null;

                // 统一保证 colors 存在（否则 shader 需要 aColor 会缺）
                const vCount = (parsed.positions.length / 3) | 0;
                if (!parsed.colors) {
                    const c = new Float32Array(vCount * 4);
                    for (let i = 0; i < vCount; i++) c.set([1, 1, 1, 1], i * 4);
                    parsed.colors = c;
                }

                // 如果是网格但 normals 仍为空，补默认
                if (parsed.indices && !parsed.normals) {
                    const n = new Float32Array(vCount * 3);
                    for (let i = 0; i < vCount; i++) { n[i * 3 + 1] = 1; }
                    parsed.normals = n;
                }

                // 删除旧模型
                if (plyModel) {
                    // 这里简单处理：不做完整 dispose（你要严格释放再补）
                    // scene.root.remove(plyModel) 也可以，但我们没直接暴露 root remove 的快捷
                    // 直接标记不可见也行：
                    plyModel.visible = false;
                }

                // 创建 mesh
                const wantTriangles = !!parsed.indices && document.getElementById("viewMode").value !== "points";
                const mode = wantTriangles ? gl.TRIANGLES : gl.POINTS;

                const attrs = {
                    aPosition: { data: parsed.positions, size: 3 },
                    aColor: { data: parsed.colors, size: 4 },
                };
                if (wantTriangles) attrs.aNormal = { data: parsed.normals, size: 3 };

                const mesh = Mesh.fromData(device, {
                    attributes: attrs,
                    indices: wantTriangles ? parsed.indices : null,
                    mode
                });

                // material/program
                const program = wantTriangles ? progMesh : progPoints;
                const material = new Material(program, {
                    depthTest: true, depthWrite: true, blend: false, cull: wantTriangles,
                    uniforms: {
                        uColor: vec4.fromValues(1, 1, 1, 1),
                        uPointSize: parseFloat(document.getElementById("pointSize").value),
                        uRoundPoints: 1.0,
                        uUseFakeLight: document.getElementById("fakeLight").checked ? 1.0 : 0.0
                    }
                });

                plyModel = new Model(mesh, material, name);
                scene.add(plyModel);

                // 视角适配
                controls.setFromBounds(parsed.bbox);

                // 更新 stats
                updateStats(parsed, wantTriangles);

                // 默认按 UI 状态应用轴染色（如果选择了）
                applyAxisColor(document.getElementById("axisColor").value);

                // 清空测量
                clearMeasurements();

                toast(`加载成功：${name}`);
            } catch (e) {
                console.error(e);
                toast(`加载失败：\n${e?.message || e}`, 5200);
            }
        }

        function updateStats(parsed, wantTriangles) {
            const st = document.getElementById("stats");
            const vCount = parsed.vertexCount ?? ((parsed.positions.length / 3) | 0);
            const triCount = wantTriangles ? (parsed.triangleCount ?? ((parsed.indices.length / 3) | 0)) : 0;
            const b = parsed.bbox;
            const sx = (b.max[0] - b.min[0]).toFixed(6);
            const sy = (b.max[1] - b.min[1]).toFixed(6);
            const sz = (b.max[2] - b.min[2]).toFixed(6);

            st.innerHTML = `
              <div>顶点：${vCount}</div>
              <div>三角形：${triCount}</div>
              <div>包围盒尺寸：${sx} / ${sy} / ${sz}</div>
              <div style="opacity:.7;">提示：数值为导入后（可能已居中/归一化）</div>
            `;
        }

        // -----------------------
        // Measurement logic
        // -----------------------
        function clearMeasurements() {
            measurements.length = 0;
            pendingPoint = null;
            updateMeasureMeshes();
        }

        function addMeasurement(a, b) {
            const dx = b[0] - a[0], dy = b[1] - a[1], dz = b[2] - a[2];
            const dist = Math.hypot(dx, dy, dz);
            measurements.push({ a, b, dist });
            pendingPoint = null;
            updateMeasureMeshes();
        }

        // click handling
        canvas.addEventListener("click", (e) => {
            // 非测量模式：点击不处理
            if (!measureEnabled) return;
            if (!plyModel || !plyCPU) return;

            // 避免拖动后触发 click：如果 mousemove 发生较大位移，则不算点击
            // （简单做法：用 pointerdown/up 更严格；这里先够用）
            const rect = canvas.getBoundingClientRect();
            const mx = (e.clientX - rect.left) * (canvas.width / rect.width);
            const my = (e.clientY - rect.top) * (canvas.height / rect.height);

            const px = parseFloat(document.getElementById("snapPixels").value) || 10;
            const p = pickVertexScreenSpace(mx, my, px);
            if (!p) {
                toast("未命中点（可适当增大“像素吸附”）");
                return;
            }

            if (!pendingPoint) {
                pendingPoint = p;
                updateMeasureMeshes();
            } else {
                addMeasurement(pendingPoint, p);
            }
        });

        // -----------------------
        // UI bindings
        // -----------------------
        const fileEl = document.getElementById("file");
        fileEl.addEventListener("change", async (e) => {
            const f = e.target.files?.[0];
            if (!f) return;
            const buf = await f.arrayBuffer();
            await loadPLYFromArrayBuffer(buf, f.name);
            fileEl.value = "";
        });

        document.getElementById("btnDemo").addEventListener("click", async () => {
            const url = prompt("输入 PLY URL（同源或已开启 CORS）：", "./demo.ply");
            if (!url) return;
            try {
                const r = await fetch(url);
                if (!r.ok) throw new Error("HTTP " + r.status);
                const buf = await r.arrayBuffer();
                await loadPLYFromArrayBuffer(buf, url.split("/").pop());
            } catch (e) {
                toast(`URL 加载失败：\n${e?.message || e}`, 5200);
            }
        });

        document.getElementById("pointSize").addEventListener("input", (e) => {
            const v = parseFloat(e.target.value);
            document.getElementById("pointSizeVal").textContent = v.toFixed(1);
            if (plyModel?.material) plyModel.material.uniforms.uPointSize = v;
        });

        document.getElementById("fakeLight").addEventListener("change", (e) => {
            const on = e.target.checked ? 1.0 : 0.0;
            if (plyModel?.material) plyModel.material.uniforms.uUseFakeLight = on;
        });

        document.getElementById("btnApplyAxis").addEventListener("click", () => {
            applyAxisColor(document.getElementById("axisColor").value);
        });

        document.getElementById("btnMeasure").addEventListener("click", (e) => {
            measureEnabled = !measureEnabled;
            e.target.textContent = measureEnabled ? "关闭测量" : "开启测量";
            e.target.classList.toggle("primary", measureEnabled);
            pendingPoint = null;
            updateMeasureMeshes();
            toast(measureEnabled ? "测量已开启：点两个点" : "测量已关闭");
        });

        document.getElementById("btnClearMeasure").addEventListener("click", () => {
            clearMeasurements();
        });

        document.getElementById("btnReset").addEventListener("click", () => {
            if (plyCPU?.bbox) controls.setFromBounds(plyCPU.bbox);
            else {
                controls.target = vec3.fromValues(0, 0, 0);
                controls.distance = 3;
                controls.yaw = Math.PI * 0.25;
                controls.pitch = Math.PI * 0.12;
                controls.updateCamera();
            }
            toast("已重置视角");
        });

        // -----------------------
        // Controls + Render Loop
        // -----------------------
        const controls = new OrbitControls(canvas, camera);

        // 每帧把 uPointSize 同步给点云材质 & 测量点
        function syncUniforms() {
            const ps = parseFloat(document.getElementById("pointSize").value);
            if (plyModel?.material) plyModel.material.uniforms.uPointSize = ps;
            measurePointsModel.material.uniforms.uPointSize = Math.max(7.0, ps * 3.2);
            measurePointsModel.material.uniforms.uRoundPoints = 1.0;
        }

        // Renderer 内部会 set uMVP/uNormalMat 等，我们只要保证 camera.updateMatrices() 可用
        // 但 runtime 的 renderer.render 会自动 set uMVP 等（按约定 uniform 名）
        // 这里确保 Model 的 worldMatrix 是最新（scene.update 内部会做）
        function frame() {
            resize();
            syncUniforms();

            // 渲染
            renderer.render(scene, camera);

            requestAnimationFrame(frame);
        }
        frame();

        // 初始提示
        toast("请导入 .ply 文件开始（或点“加载 URL”）", 3000);
    </script>
</body>
</html>
