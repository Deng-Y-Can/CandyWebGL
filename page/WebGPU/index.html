<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebGPU 示例 - 彩色三角形 v1</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #e6e6e6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
        }

        .container {
            max-width: 1200px;
            width: 100%;
        }

        header {
            text-align: center;
            margin-bottom: 2rem;
        }

        h1 {
            font-size: 2.8rem;
            background: linear-gradient(90deg, #3498db, #9b59b6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            font-size: 1.2rem;
            color: #95a5a6;
            margin-bottom: 2rem;
        }

        .content {
            display: grid;
            grid-template-columns: 1fr 300px;
            gap: 2rem;
        }

        @media (max-width: 900px) {
            .content {
                grid-template-columns: 1fr;
            }
        }

        .canvas-container {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            padding: 1rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            overflow: hidden;
        }

        canvas {
            width: 100%;
            height: 500px;
            display: block;
            border-radius: 8px;
            background: #000;
        }

        .info-panel {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 1.5rem;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        h2 {
            color: #3498db;
            margin-bottom: 1rem;
            font-size: 1.5rem;
        }

        .status {
            background: rgba(0, 0, 0, 0.3);
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
        }

        #statusText {
            font-family: 'Consolas', monospace;
            color: #2ecc71;
            font-weight: bold;
        }

        .status.error {
            color: #e74c3c;
        }

        .controls {
            margin-top: 1.5rem;
        }

        .control-group {
            margin-bottom: 1rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            color: #bdc3c7;
        }

        select, button {
            width: 100%;
            padding: 0.8rem;
            border-radius: 6px;
            border: none;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button {
            background: linear-gradient(90deg, #3498db, #2980b9);
            font-weight: bold;
            margin-top: 0.5rem;
        }

            button:hover {
                background: linear-gradient(90deg, #2980b9, #3498db);
                transform: translateY(-2px);
                box-shadow: 0 5px 15px rgba(52, 152, 219, 0.4);
            }

            button:active {
                transform: translateY(0);
            }

        .instructions {
            margin-top: 2rem;
            line-height: 1.6;
        }

        code {
            background: rgba(0, 0, 0, 0.4);
            padding: 0.2rem 0.4rem;
            border-radius: 4px;
            font-family: 'Consolas', monospace;
            color: #f39c12;
        }

        footer {
            margin-top: 3rem;
            text-align: center;
            color: #7f8c8d;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎨 WebGPU 图形演示</h1>
            <p class="subtitle">现代 Web 图形 API 的彩色三角形示例</p>
        </header>

        <div class="content">
            <div class="canvas-container">
                <canvas id="webgpuCanvas"></canvas>
            </div>

            <div class="info-panel">
                <div class="status">
                    <h2>系统状态</h2>
                    <p id="statusText">正在初始化 WebGPU...</p>
                    <p id="gpuInfo">GPU: 检测中...</p>
                </div>

                <div class="controls">
                    <h2>控制面板</h2>

                    <div class="control-group">
                        <label for="colorSelect">三角形颜色</label>
                        <select id="colorSelect">
                            <option value="rainbow">🌈 彩虹渐变</option>
                            <option value="blue">🔵 蓝色系</option>
                            <option value="purple">🟣 紫色系</option>
                            <option value="fire">🔥 火焰色</option>
                            <option value="ocean">🌊 海洋色</option>
                        </select>
                    </div>

                    <div class="control-group">
                        <label for="rotationSpeed">旋转速度</label>
                        <select id="rotationSpeed">
                            <option value="0">🛑 停止</option>
                            <option value="0.5" selected>🐢 慢速</option>
                            <option value="1">🐕 正常</option>
                            <option value="2">🐆 快速</option>
                            <option value="5">🚀 极速</option>
                        </select>
                    </div>

                    <button id="fullscreenBtn">🖥️ 切换全屏</button>
                    <button id="reloadBtn">🔄 重新渲染</button>
                </div>

                <div class="instructions">
                    <h2>📖 使用说明</h2>
                    <p>1. 需要 Chrome/Edge 113+ 或 Firefox Nightly</p>
                    <p>2. 确保浏览器已启用 WebGPU</p>
                    <p>3. 使用下拉菜单改变效果</p>
                    <p>代码使用 <code>WGSL</code> 着色器语言</p>
                </div>
            </div>
        </div>

        <footer>
            <p>WebGPU 示例 | 使用现代图形 API 渲染 | 兼容性: Chrome 113+, Edge 113+, Safari 17+</p>
        </footer>
    </div>

    <script>
        // ============ WebGPU 核心代码开始 ============

        // 获取DOM元素
        const canvas = document.getElementById('webgpuCanvas');
        const statusText = document.getElementById('statusText');
        const gpuInfo = document.getElementById('gpuInfo');
        const colorSelect = document.getElementById('colorSelect');
        const rotationSpeed = document.getElementById('rotationSpeed');
        const fullscreenBtn = document.getElementById('fullscreenBtn');
        const reloadBtn = document.getElementById('reloadBtn');

        // 初始化变量
        let device, context, pipeline, vertexBuffer;
        let rotation = 0;
        let animationFrameId;
        let currentColorMode = 'rainbow';

        // 顶点数据 - 一个彩色三角形
        const vertices = new Float32Array([
            // 位置 (x, y)      // 颜色 (r, g, b)
            0.0, 0.5, 1.0, 0.0, 0.0,  // 顶部顶点 - 红色
            -0.5, -0.5, 0.0, 1.0, 0.0,  // 左下顶点 - 绿色
            0.5, -0.5, 0.0, 0.0, 1.0   // 右下顶点 - 蓝色
        ]);

        // 顶点着色器 - WGSL语言
        const vertexShader = `
                    struct VertexInput {
                        @location(0) position: vec2<f32>,
                        @location(1) color: vec3<f32>,
                    };

                    struct VertexOutput {
                        @builtin(position) position: vec4<f32>,
                        @location(0) color: vec3<f32>,
                    };

                    struct Uniforms {
                        rotation: f32,
                        time: f32,
                        colorMode: f32,
                    };

                    @group(0) @binding(0) var<uniform> uniforms: Uniforms;

                    @vertex
                    fn main(input: VertexInput) -> VertexOutput {
                        var output: VertexOutput;

                        // 应用旋转
                        let cos_r = cos(uniforms.rotation);
                        let sin_r = sin(uniforms.rotation);
                        let rotated_position = vec2<f32>(
                            input.position.x * cos_r - input.position.y * sin_r,
                            input.position.x * sin_r + input.position.y * cos_r
                        );

                        output.position = vec4<f32>(rotated_position, 0.0, 1.0);

                        // 根据颜色模式调整颜色
                        var color = input.color;
                        let time = uniforms.time;

                        if (uniforms.colorMode == 1.0) { // 蓝色系
                            color = vec3<f32>(0.2, 0.4, 0.8) * (color + 0.3);
                        } else if (uniforms.colorMode == 2.0) { // 紫色系
                            color = vec3<f32>(0.7, 0.3, 0.8) * (color + 0.2);
                        } else if (uniforms.colorMode == 3.0) { // 火焰色
                            color = vec3<f32>(
                                0.8 + 0.2 * sin(time),
                                0.3 + 0.2 * cos(time * 0.7),
                                0.1
                            );
                        } else if (uniforms.colorMode == 4.0) { // 海洋色
                            color = vec3<f32>(
                                0.1 + 0.2 * sin(time * 0.5),
                                0.3 + 0.3 * cos(time * 0.3),
                                0.6 + 0.2 * sin(time * 0.8)
                            );
                        } else { // 彩虹渐变（默认）
                            color = vec3<f32>(
                                0.5 + 0.5 * sin(time + input.position.x),
                                0.5 + 0.5 * sin(time * 1.3 + input.position.y),
                                0.5 + 0.5 * sin(time * 1.7 + input.position.x + input.position.y)
                            );
                        }

                        output.color = color;
                        return output;
                    }
                `;

        // 片段着色器 - WGSL语言
        const fragmentShader = `
                    @fragment
                    fn main(@location(0) color: vec3<f32>) -> @location(0) vec4<f32> {
                        return vec4<f32>(color, 1.0);
                    }
                `;

        // 初始化 WebGPU
        async function initWebGPU() {
            try {
                statusText.textContent = "正在检查 WebGPU 支持...";

                // 检查 WebGPU 支持
                if (!navigator.gpu) {
                    throw new Error("您的浏览器不支持 WebGPU。请使用 Chrome/Edge 113+ 或 Firefox Nightly。");
                }

                // 请求 GPU 适配器
                const adapter = await navigator.gpu.requestAdapter();
                if (!adapter) {
                    throw new Error("无法获取 GPU 适配器。");
                }

                // 显示 GPU 信息
                gpuInfo.textContent = `GPU: ${adapter.info.vendor || '未知厂商'} / ${adapter.info.architecture || '未知架构'}`;

                // 请求 GPU 设备
                device = await adapter.requestDevice();

                // 获取 Canvas 上下文
                context = canvas.getContext('webgpu');
                if (!context) {
                    throw new Error("无法获取 WebGPU 上下文。");
                }

                // 配置 Canvas
                const canvasFormat = navigator.gpu.getPreferredCanvasFormat();
                context.configure({
                    device: device,
                    format: canvasFormat,
                    alphaMode: 'premultiplied'
                });

                // 创建顶点缓冲区
                vertexBuffer = device.createBuffer({
                    size: vertices.byteLength,
                    usage: GPUBufferUsage.VERTEX | GPUBufferUsage.COPY_DST,
                    mappedAtCreation: true
                });
                new Float32Array(vertexBuffer.getMappedRange()).set(vertices);
                vertexBuffer.unmap();

                // 创建渲染管线
                pipeline = device.createRenderPipeline({
                    layout: 'auto',
                    vertex: {
                        module: device.createShaderModule({ code: vertexShader }),
                        entryPoint: 'main',
                        buffers: [{
                            arrayStride: 5 * 4, // 每个顶点5个float，每个float4字节
                            attributes: [
                                {
                                    // 位置属性
                                    shaderLocation: 0,
                                    offset: 0,
                                    format: 'float32x2'
                                },
                                {
                                    // 颜色属性
                                    shaderLocation: 1,
                                    offset: 2 * 4, // 跳过位置的两个float
                                    format: 'float32x3'
                                }
                            ]
                        }]
                    },
                    fragment: {
                        module: device.createShaderModule({ code: fragmentShader }),
                        entryPoint: 'main',
                        targets: [{ format: canvasFormat }]
                    },
                    primitive: {
                        topology: 'triangle-list'
                    }
                });

                // 创建统一缓冲区
                const uniformBufferSize = 3 * 4; // 3个float，每个4字节
                const uniformBuffer = device.createBuffer({
                    size: uniformBufferSize,
                    usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST,
                });

                // 创建绑定组
                const bindGroup = device.createBindGroup({
                    layout: pipeline.getBindGroupLayout(0),
                    entries: [{
                        binding: 0,
                        resource: { buffer: uniformBuffer }
                    }]
                });

                statusText.textContent = "✅ WebGPU 初始化成功！";
                statusText.style.color = "#2ecc71";

                // 开始渲染循环
                render(uniformBuffer, bindGroup);

            } catch (error) {
                statusText.textContent = `❌ 错误: ${error.message}`;
                statusText.style.color = "#e74c3c";
                console.error("WebGPU 初始化失败:", error);
            }
        }

        // 渲染函数
        function render(uniformBuffer, bindGroup) {
            const startTime = performance.now();

            function frame() {
                if (!device || !pipeline) return;

                // 更新旋转角度
                const speed = parseFloat(rotationSpeed.value);
                rotation += 0.01 * speed;

                // 更新时间
                const currentTime = performance.now();
                const time = (currentTime - startTime) * 0.001;

                // 设置颜色模式
                let colorModeValue;
                switch (colorSelect.value) {
                    case 'blue': colorModeValue = 1; break;
                    case 'purple': colorModeValue = 2; break;
                    case 'fire': colorModeValue = 3; break;
                    case 'ocean': colorModeValue = 4; break;
                    default: colorModeValue = 0; // 彩虹
                }

                // 更新统一缓冲区
                const uniformData = new Float32Array([rotation, time, colorModeValue]);
                device.queue.writeBuffer(uniformBuffer, 0, uniformData);

                // 创建命令编码器
                const commandEncoder = device.createCommandEncoder();

                // 开始渲染通道
                const renderPass = commandEncoder.beginRenderPass({
                    colorAttachments: [{
                        view: context.getCurrentTexture().createView(),
                        loadOp: 'clear',
                        storeOp: 'store',
                        clearValue: [0.05, 0.05, 0.08, 1.0] // 深色背景
                    }]
                });

                // 设置渲染管线
                renderPass.setPipeline(pipeline);
                renderPass.setVertexBuffer(0, vertexBuffer);
                renderPass.setBindGroup(0, bindGroup);
                renderPass.draw(3); // 绘制3个顶点

                // 结束渲染
                renderPass.end();

                // 提交命令
                device.queue.submit([commandEncoder.finish()]);

                // 继续下一帧
                animationFrameId = requestAnimationFrame(frame);
            }

            // 启动渲染循环
            frame();
        }

        // ============ 事件监听器 ============

        colorSelect.addEventListener('change', () => {
            currentColorMode = colorSelect.value;
        });

        rotationSpeed.addEventListener('change', () => {
            // 速度改变立即生效
        });

        fullscreenBtn.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                canvas.requestFullscreen().catch(err => {
                    console.error("全屏失败:", err);
                });
            } else {
                document.exitFullscreen();
            }
        });

        reloadBtn.addEventListener('click', () => {
            if (animationFrameId) {
                cancelAnimationFrame(animationFrameId);
            }
            initWebGPU();
        });

        // 处理窗口大小变化
        window.addEventListener('resize', () => {
            canvas.width = canvas.clientWidth * window.devicePixelRatio;
            canvas.height = canvas.clientHeight * window.devicePixelRatio;
        });

        // 设置 Canvas 大小
        function resizeCanvas() {
            const container = canvas.parentElement;
            canvas.width = container.clientWidth * window.devicePixelRatio;
            canvas.height = 500 * window.devicePixelRatio;
        }

        // ============ 页面加载完成时初始化 ============
        window.addEventListener('DOMContentLoaded', () => {
            resizeCanvas();
            initWebGPU();
        });

        // 处理页面可见性变化
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                if (animationFrameId) {
                    cancelAnimationFrame(animationFrameId);
                }
            } else {
                if (device) {
                    // 重新开始渲染循环
                    const uniformBuffer = device.createBuffer({
                        size: 12,
                        usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST,
                    });
                    const bindGroup = device.createBindGroup({
                        layout: pipeline.getBindGroupLayout(0),
                        entries: [{
                            binding: 0,
                            resource: { buffer: uniformBuffer }
                        }]
                    });
                    render(uniformBuffer, bindGroup);
                }
            }
        });
    </script>
</body>
</html>
